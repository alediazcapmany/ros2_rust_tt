version: '3.8'
services:
  dev_env:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rust_ros2_dev
    volumes:
      - ./tracktrack_rust:/app/tracktrack_rust
      - ./ros2_ws:/app/ros2_ws
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - PKG_CONFIG_PATH=/usr/local/lib/pkgconfig:/usr/lib/x86_64-linux-gnu/pkgconfig
      - LD_LIBRARY_PATH=/usr/local/lib:/opt/ros/humble/lib
    network_mode: "host"
    ipc: "host"
    stdin_open: true
    tty: true

  dev_env_realsense:
    extends: dev_env
    privileged: true
    devices:
      - /dev/bus/usb:/dev/bus/usb